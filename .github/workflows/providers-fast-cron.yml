name: Providers Fast Cron

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch: {}

jobs:
  sync-providers-fast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fast provider crons (CardCenter, CardDepot, CardCookie, GCX)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm ts-node --esm scripts/run-fast-crons.ts

