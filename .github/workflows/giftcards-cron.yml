name: Giftcards.com Cron

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print matched/unmatched, no DB writes)"
        type: boolean
        default: false

jobs:
  sync-giftcards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Giftcards.com cron
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RAKUTEN_CLIENT_ID: ${{ secrets.RAKUTEN_CLIENT_ID }}
          RAKUTEN_CLIENT_SECRET: ${{ secrets.RAKUTEN_CLIENT_SECRET }}
          RAKUTEN_SID: ${{ secrets.RAKUTEN_SID }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: pnpm exec tsx scripts/run-giftcards-cron.ts
