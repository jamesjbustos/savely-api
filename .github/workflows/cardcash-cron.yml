name: CardCash Cron

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes
  workflow_dispatch: {}

jobs:
  sync-cardcash:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright system dependencies
        run: sudo npx -y playwright install-deps chromium

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run CardCash cron (fetch + DB update)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LINKSYNERGY_SITE_ID: ${{ secrets.LINKSYNERGY_SITE_ID }}
          CARDCASH_ADVERTISER_ID: ${{ secrets.CARDCASH_ADVERTISER_ID }}
        run: pnpm cron:cardcash
